<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Responsive</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* SECTION 1: MENU */
.menu {
    display: flex;
    justify-content: center;
    background: #333;
}
.menu div {
    padding: 15px 20px;
    color: white;
}

/* SECTION 2: HERO */
.hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding: 40px;
    align-items: center;
}
.hero img {
    width: 100%;
}

/* SECTION 3: BIODATA */
.biodata {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 40px;
}
.box {
    background: #f4f4f4;
    padding: 20px;
    text-align: center;
}

/* SECTION 4: PORTFOLIO */
.portfolio {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 40px;
}
.portfolio img {
    width: 100%;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .hero {
        grid-template-columns: 1fr;
        text-align: center;
    }

    .biodata {
        grid-template-columns: 1fr 1fr;
    }

    .portfolio {
        grid-template-columns: 1fr 1fr;
    }
}

@media (max-width: 480px) {
    .biodata {
        grid-template-columns: 1fr;
    }

    .portfolio {
        grid-template-columns: 1fr;
    }
}
</style>

</head>
<body>

<!-- SECTION 1 -->
<div class="menu">
    <div>Home</div>
    <div>About</div>
    <div>Biodata</div>
    <div>Portfolio</div>
</div>

<!-- SECTION 2 -->
<div class="hero">
    <div>
        <h1>Selamat Datang</h1>
        <p>Ini adalah website responsive menggunakan CSS Grid.</p>
    </div>
    <div>
        <img src="contoh foto.png">
    </div>
</div>

<!-- SECTION 3 -->
<div class="biodata">
    <div class="box">Nama</div>
    <div class="box">Umur</div>
    <div class="box">Alamat</div>
    <div class="box">Email</div>
    <div class="box">No HP</div>
    <div class="box">Hobi</div>
</div>

<!-- SECTION 4 -->
<div class="portfolio">
    <div>
        <img src="-2.jpg">
        <p>Project 1</p>
    </div>
    <div>
        <img src="-2.jpg">
        <p>Project 2</p>
    </div>
    <div>
        <img src="-2.jpg">
        <p>Project 3</p>
    </div>
</div>

</body>
</html>
